[package]
name = "libsignal-protocol"
version = "0.1.0"
authors = ["Signal Messenger LLC"]
edition = "2021"
license = "AGPL-3.0-only"

[dependencies]
libsignal-core = { path = "../libsignal-core" }
signal-crypto = { path = "../signal-crypto" }

aes = { version = "0.8.3", features = ["zeroize"] }
aes-gcm-siv = "0.11.1"
arrayref = "0.3.6"
assert_matches = "1.5"
async-trait = "0.1.41"
ctr = { version = "0.9.2", features = ["zeroize"] }
derive-where = "1.2.5"
displaydoc = "0.2"
hex = "0.4"
hkdf = "0.12"
hmac = "0.12.0"
indexmap = "2.1.0"
itertools = "0.13.0"
log = "0.4"
num_enum = "0.7.2"
pqcrypto-kyber = { version = "0.7.6", default-features = false, features = ["std"], optional = true }
pqcrypto-traits = { version = "0.3.4", optional = true }
prost = "0.13.1"
rand = "0.8"
rayon = { version = "1.8.0", optional = true }
serde = { version = "1.0", features = ["derive"] }
sha2 = "0.10"
subtle = "2.6"
thiserror = "1.0.57"
uuid = "1.1.2"
zerocopy = { version = "0.7.34", features = ["derive"] }

[features]
default = ["kyber", "rayon"]
kyber = ["dep:pqcrypto-kyber", "dep:pqcrypto-traits"]
rayon = ["dep:rayon"]

[dev-dependencies]
hex-literal = "0.4"
proptest = "1.0"

[build-dependencies]
prost-build = "0.13.1"

